services:
  # Backend Express API server + Python scraper
  - type: web
    name: tenderpulse-api
    runtime: node
    plan: standard
    buildCommand: |
      npm install
      pip install -r requirements.txt
      playwright install chromium
    startCommand: npm run server
    envVars:
      - key: PORT
        value: 8000
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
    healthCheckPath: /health
    autoDeploy: true

  # Frontend React app (static deployment)
  - type: static_site
    name: tenderpulse-web
    runtime: node
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://tender-scrap-react-python.onrender.com
    autoDeploy: true